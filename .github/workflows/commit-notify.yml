name: Commit Notification

on:
  push:
    branches: [main]

jobs:
  notify:
    name: Notify Discord
    runs-on: ubuntu-24.04
    steps:
      - name: Send Discord notification
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_RELEASES }}
        run: |
          AUTHOR="${{ github.event.head_commit.author.name }}"
          RAW_MESSAGE="${{ github.event.head_commit.message }}"
          # Take only the first line of the commit message
          MESSAGE=$(echo "$RAW_MESSAGE" | head -1)
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          # Build content string safely via jq
          CONTENT=$(jq -rn \
            --arg short_sha "$SHORT_SHA" \
            --arg author "$AUTHOR" \
            --arg message "$MESSAGE" \
            '"📦 **New commit on `main`:**\n`\($short_sha)` **\($author)** — \($message)"')

          HTTP_CODE=$(echo '{}' | jq --arg content "$CONTENT" '{content: $content}' | \
            curl -s -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @- \
              -o /dev/null -w "%{http_code}")

          echo "Discord response: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Notification sent"
          else
            echo "⚠️  Notification failed (HTTP $HTTP_CODE)" >&2
            exit 1
          fi
